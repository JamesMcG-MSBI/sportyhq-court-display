name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Deploy API credentials as Azure Static Web App application settings.
      # These become environment variables available to the Azure Function proxy.
      # Requires the following GitHub repository secrets:
      #   AZURE_CREDENTIALS       — JSON output of: az ad sp create-for-rbac --sdk-auth
      #   AZURE_RESOURCE_GROUP    — Resource group containing the Static Web App
      #   AZURE_SWA_NAME          — Name of the Static Web App resource
      #   SPORTYHQ_API_KEY        — SportyHQ API key
      #   SPORTYHQ_CLUB_KEY       — SportyHQ club key
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure Function application settings
        run: |
          az staticwebapp appsettings set \
            --name "${{ secrets.AZURE_SWA_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --setting-names \
              SPORTYHQ_API_KEY="${{ secrets.SPORTYHQ_API_KEY }}" \
              SPORTYHQ_CLUB_KEY="${{ secrets.SPORTYHQ_CLUB_KEY }}"

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_GLACIER_01ECDA703 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "api" # Azure Function proxy
          output_location: "." # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_GLACIER_01ECDA703 }}
          action: "close"
