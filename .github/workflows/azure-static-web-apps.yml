# ════════════════════════════════════════════════════════════
# Azure Static Web Apps — Deployment Workflow
#
# SETUP REQUIRED:
#   Before this workflow will deploy successfully, you must add
#   the Azure Static Web Apps deployment token as a GitHub secret:
#
#   1. Create your Static Web App in the Azure portal (see README.md).
#   2. Copy the deployment token from:
#        Azure portal → your Static Web App → Overview → Manage deployment token
#   3. In GitHub, go to:
#        Settings → Secrets and variables → Actions → New repository secret
#   4. Name: AZURE_STATIC_WEB_APPS_API_TOKEN
#      Value: (paste the token from the Azure portal)
# ════════════════════════════════════════════════════════════

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      # Substitute API key placeholders from GitHub repository secrets.
      # Add SPORTYHQ_API_KEY and SPORTYHQ_CLUB_KEY in:
      #   GitHub → Settings → Secrets and variables → Actions
      - name: Inject API secrets
        run: |
          sed -i 's/__SPORTYHQ_API_KEY__/${{ secrets.SPORTYHQ_API_KEY }}/g' js/noticeboard.js
          sed -i 's/__SPORTYHQ_CLUB_KEY__/${{ secrets.SPORTYHQ_CLUB_KEY }}/g' js/noticeboard.js

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "/"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
